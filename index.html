<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thalidomide VR Experience (GLB Version)</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
</head>
<body>

    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .molecule">
        
        <a-assets>
            <a-asset-item id="thalidomide-glb" src="thalidomide.glb"></a-asset-item>
        </a-assets>

        <a-sky color="#f5f5f5"></a-sky>
        <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
        <a-entity light="type: directional; intensity: 1;" position="1 3 1"></a-entity>

        <a-entity id="rig" position="0 0 2">
            <a-camera id="camera" look-controls wasd-controls position="0 1.6 0">
                <a-entity cursor="fuse: true; fuseTimeout: 1000"
                          position="0 0 -1"
                          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                          material="color: black; shader: flat"
                          raycaster="objects: .molecule">
                </a-entity>
            </a-camera>
            <a-entity laser-controls="hand: right" raycaster="objects: .molecule; far: 100"></a-entity>
        </a-entity>

        <a-entity id="r-molecule-container" position="-2 1.5 -2">
            <a-entity class="molecule"
                      gltf-model="#thalidomide-glb" 
                      scale="0.01 0.01 0.01" 
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"
                      event-set__mouseenter="scale: 0.55 0.55 0.55"
                      event-set__mouseleave="scale: 0.5 0.5 0.5"
                      onclick="showInfo('R')">
            </a-entity>
            <a-text value="R-Thalidomide" position="0 1.2 0" align="center" color="#333" width="4"></a-text>
            <a-text value="(Safe/Sedative)" position="0 0.9 0" align="center" color="#008000" width="3.5"></a-text>
        </a-entity>

        <a-entity id="s-molecule-container" position="2 1.5 -2">
            <a-entity class="molecule"
                      gltf-model="#thalidomide-glb" 
                      scale="-0.5 0.5 0.5" 
                      animation="property: rotation; to: 0 -360 0; loop: true; dur: 10000; easing: linear"
                      event-set__mouseenter="scale: -0.55 0.55 0.55"
                      event-set__mouseleave="scale: -0.5 0.5 0.5"
                      onclick="showInfo('S')">
            </a-entity>
            <a-text value="S-Thalidomide" position="0 1.2 0" align="center" color="#333" width="4"></a-text>
            <a-text value="(Toxic/Teratogenic)" position="0 0.9 0" align="center" color="#FF0000" width="3.5"></a-text>
        </a-entity>

        <a-plane id="info-panel" position="0 2.8 -1.8" width="3.2" height="1.2" color="#222" visible="false" material="opacity: 0.95">
            <a-text id="info-text" value="" align="center" color="white" width="3" position="0 0 0.01"></a-text>
            <a-plane id="close-btn" position="1.4 0.45 0.02" width="0.3" height="0.2" color="#FF4444" class="molecule" onclick="hideInfo()">
                <a-text value="X" align="center" color="white" width="2"></a-text>
            </a-plane>
        </a-plane>

    </a-scene>

    <script>
        const infoPanel = document.getElementById('info-panel');
        const infoText = document.getElementById('info-text');

        function showInfo(type) {
            infoPanel.setAttribute('visible', 'true');
            if (type === 'R') {
                infoText.setAttribute('value', 'R-Enantiomer: Therapeutic form used as a sedative. It does not fit the DNA-binding site that causes defects.');
infoText.setAttribute('color', '#90EE90');
            } else if (type === 'S') {
                infoText.setAttribute('value', 'S-Enantiomer: Teratogenic form. It binds to the protein Cereblon, leading to interference with limb development (Phocomelia).');
                infoText.setAttribute('color', '#FFB6C1');
            }
        }

        function hideInfo() {
            infoPanel.setAttribute('visible', 'false');
        }
    </script>
</body>
</html>
